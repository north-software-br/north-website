  <circle cx="358" cy="140" r="14" fill="#3DAFA6" opacity="0.15"/>
  <circle cx="358" cy="140" r="10" fill="#3DAFA6" opacity="0.2"/>
  <circle cx="358" cy="140" r="5"  fill="#3DAFA6"/>
