<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 390 844" width="390" height="844">
  <defs>
    <linearGradient id="chartFill" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#3DAFA6" stop-opacity="0.20"/>
      <stop offset="100%" stop-color="#3DAFA6" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="cardGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0F2337"/>
      <stop offset="100%" stop-color="#0C1E2F"/>
    </linearGradient>
    <clipPath id="chartClip">
      <rect x="28" y="295" width="334" height="120" rx="0"/>
    </clipPath>
  </defs>

  <!-- ── Background ── -->
  <rect width="390" height="844" fill="#08172A"/>

  <!-- ── Status bar ── -->
  <text x="28" y="56" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="13" font-weight="600" fill="#F0EDE3" opacity="0.85">9:41</text>
  <!-- Signal bars -->
  <rect x="310" y="48" width="4" height="7"  rx="1" fill="#F0EDE3" opacity="0.4"/>
  <rect x="317" y="45" width="4" height="10" rx="1" fill="#F0EDE3" opacity="0.6"/>
  <rect x="324" y="42" width="4" height="13" rx="1" fill="#F0EDE3" opacity="0.85"/>
  <!-- Wifi -->
  <path d="M336 54 Q341 49.5 346 54" fill="none" stroke="#F0EDE3" stroke-width="1.6" stroke-linecap="round" opacity="0.7"/>
  <path d="M339 57 Q341 55 343 57"  fill="none" stroke="#F0EDE3" stroke-width="1.6" stroke-linecap="round" opacity="0.7"/>
  <circle cx="341" cy="60" r="1.4" fill="#F0EDE3" opacity="0.7"/>
  <!-- Battery -->
  <rect x="352" y="49" width="22" height="11" rx="2.5" fill="none" stroke="#F0EDE3" stroke-width="1.4" opacity="0.7"/>
  <rect x="374" y="52.5" width="2" height="4" rx="1" fill="#F0EDE3" opacity="0.5"/>
  <rect x="353.5" y="50.5" width="15" height="8" rx="1.5" fill="#3DAFA6" opacity="0.9"/>

  <!-- ── App header ── -->
  <text x="28" y="102" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="22" font-weight="700" fill="#F0EDE3" letter-spacing="-0.3">North</text>
  <!-- Notification bell icon -->
  <g transform="translate(332,88)" fill="none" stroke="#9DAEC0" stroke-width="1.6" stroke-linecap="round">
    <path d="M0,-7 C-4,-7 -7,-4 -7,0 L-7,5 L-9,7 L9,7 L7,5 L7,0 C7,-4 4,-7 0,-7 Z"/>
    <line x1="-2" y1="7" x2="2" y2="7"/>
    <path d="M-2,9 Q0,11 2,9" stroke-width="1.4"/>
  </g>
  <!-- Grid icon -->
  <g transform="translate(362,88)" fill="none" stroke="#9DAEC0" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
    <rect x="-9" y="-9" width="7" height="7" rx="1.5"/>
    <rect x="2"  y="-9" width="7" height="7" rx="1.5"/>
    <rect x="-9" y="2"  width="7" height="7" rx="1.5"/>
    <rect x="2"  y="2"  width="7" height="7" rx="1.5"/>
  </g>

  <!-- ── Dashboard heading ── -->
  <text x="28" y="152" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="30" font-weight="800" fill="#F0EDE3" letter-spacing="-0.8">Dashboard</text>
