  <polygon
    points="48,385 78,372 118,378 158,360 198,368 238,348 278,332 318,318 354,300 354,390 48,390"
    fill="url(#chartFill)"
    clip-path="url(#chartClip)"
  />
  <!-- Chart line -->
  <polyline
    points="48,385 78,372 118,378 158,360 198,368 238,348 278,332 318,318 354,300"
    fill="none"
    stroke="#3DAFA6"
    stroke-width="2.5"
    stroke-linecap="round"
    stroke-linejoin="round"
    clip-path="url(#chartClip)"
  />
  <!-- Endpoint dot -->
  <circle cx="354" cy="300" r="4.5" fill="#3DAFA6"/>
  <circle cx="354" cy="300" r="8" fill="#3DAFA6" opacity="0.2"/>

  <!-- X-axis labels -->
  <text x="48"  y="408" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="10" fill="#45607F" text-anchor="middle">JAN</text>
  <text x="105" y="408" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="10" fill="#45607F" text-anchor="middle">FEB</text>
  <text x="162" y="408" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="10" fill="#45607F" text-anchor="middle">MAR</text>
  <text x="219" y="408" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="10" fill="#45607F" text-anchor="middle">APR</text>
  <text x="276" y="408" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="10" fill="#45607F" text-anchor="middle">MAY</text>
  <text x="333" y="408" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="10" fill="#45607F" text-anchor="middle">JUN</text>

