  <!-- Section header -->
  <text x="28"  y="444" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="17" font-weight="700" fill="#F0EDE3">Projects</text>
  <rect x="318" y="430" width="44" height="20" rx="10" fill="#3DAFA6" opacity="0.12"/>
  <text x="340" y="444" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="11" font-weight="600" fill="#3DAFA6" text-anchor="middle">Latest</text>

  <!-- Project row 1 -->
  <rect x="28" y="458" width="334" height="66" rx="16" fill="url(#cardGrad)" stroke="rgba(255,255,255,0.06)" stroke-width="1.5"/>
  <!-- Icon -->
  <circle cx="62" cy="491" r="14" fill="#3DAFA6" opacity="0.12"/>
  <circle cx="62" cy="491" r="6"  fill="#3DAFA6"/>
  <circle cx="62" cy="491" r="3"  fill="#08172A"/>
  <!-- Text -->
  <text x="88" y="487" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="14" font-weight="600" fill="#F0EDE3">North Platform</text>
  <text x="88" y="505" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="11" fill="#6E84A0">Web · React · Node</text>
  <!-- Status badge -->
  <rect x="306" y="480" width="48" height="20" rx="10" fill="#3DAFA6" opacity="0.12"/>
  <circle cx="316" cy="490" r="3" fill="#3DAFA6"/>
  <text x="344" y="494" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="11" font-weight="500" fill="#3DAFA6" text-anchor="middle">Active</text>

  <!-- Project row 2 -->
  <rect x="28" y="536" width="334" height="66" rx="16" fill="url(#cardGrad)" stroke="rgba(255,255,255,0.06)" stroke-width="1.5"/>
  <!-- Icon -->
  <circle cx="62" cy="569" r="14" fill="#3DAFA6" opacity="0.08"/>
  <circle cx="62" cy="569" r="6"  fill="#3DAFA6" opacity="0.7"/>
  <circle cx="62" cy="569" r="3"  fill="#08172A"/>
  <!-- Text -->
  <text x="88" y="565" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="14" font-weight="600" fill="#F0EDE3">Analytics Engine</text>
  <text x="88" y="583" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="11" fill="#6E84A0">API · Python · ML</text>
  <!-- Status badge -->
  <rect x="306" y="558" width="48" height="20" rx="10" fill="#3DAFA6" opacity="0.12"/>
  <circle cx="316" cy="568" r="3" fill="#3DAFA6"/>
  <text x="344" y="572" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="11" font-weight="500" fill="#3DAFA6" text-anchor="middle">Active</text>

  <!-- ── Bottom navigation bar ── -->
  <rect x="0" y="730" width="390" height="90" fill="#08172A"/>
  <line x1="0" y1="730" x2="390" y2="730" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
  <!-- Home icon (active) -->
  <g transform="translate(50,758)" fill="none" stroke="#3DAFA6" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
    <polyline points="-13,7 0,-7 13,7"/>
    <rect x="-8" y="1" width="16" height="12" rx="2"/>
  </g>
  <circle cx="50" cy="780" r="2.5" fill="#3DAFA6"/>
  <!-- Chart icon -->
  <g transform="translate(130,758)" fill="none" stroke="#45607F" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
    <polyline points="-12,8 -5,-2 3,4 12,-8"/>
  </g>
  <!-- Users icon -->
  <g transform="translate(210,758)" fill="none" stroke="#45607F" stroke-width="1.8" stroke-linecap="round">
    <circle cx="-5" cy="-5" r="5"/>
    <path d="M-15,8 Q-15,2 -5,2 Q5,2 5,8"/>
    <circle cx="8" cy="-5" r="4" opacity="0.6"/>
    <path d="M4,8 Q5,4 8,4 Q12,4 14,6" opacity="0.6"/>
  </g>
  <!-- Settings icon -->
  <g transform="translate(340,758)" fill="none" stroke="#45607F" stroke-width="1.8" stroke-linecap="round">
    <circle cx="0" cy="0" r="5"/>
    <circle cx="0" cy="0" r="10" stroke-dasharray="3.14 2.72"/>
  </g>

  <!-- ── Bottom home indicator ── -->
  <rect x="152" y="826" width="86" height="5" rx="2.5" fill="rgba(255,255,255,0.22)"/>
</svg>
